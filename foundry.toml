[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
remappings = [
    "forge-std/=lib/forge-std/src/",
    "forge-7702/=src/"
]

[profile.ci]
fuzz = { runs = 1000 }
verbosity = 2

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

[doc]
out = "docs"
repository = "https://github.com/prateushsharma/forge-7702"