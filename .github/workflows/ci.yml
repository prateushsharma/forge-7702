name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Forge Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build --sizes

      - name: Run tests
        run: forge test -vv

      - name: Run fuzz tests (higher runs)
        run: forge test -vv --fuzz-runs 1000

      - name: Check formatting
        run: forge fmt --check